services:
  - type: web
    name: influencermatch-api
    runtime: docker
    dockerfilePath: ./backend/InfluencerMatch.API/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Cors__AllowedOrigins
        sync: false
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JwtSettings__Secret
        sync: false
      - key: YouTube__ApiKey
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: PaymentProviders__Stripe__ApiKey
        sync: false
      - key: PaymentProviders__Stripe__Secret
        sync: false
      - key: PaymentProviders__Stripe__WebhookSecret
        sync: false
      - key: PaymentProviders__Razorpay__ApiKey
        sync: false
      - key: PaymentProviders__Razorpay__Secret
        sync: false
      - key: PaymentProviders__Razorpay__WebhookSecret
        sync: false
      - key: PaymentProviders__PayPal__ApiKey
        sync: false
      - key: PaymentProviders__PayPal__Secret
        sync: false
      - key: PaymentProviders__PayPal__WebhookSecret
        sync: false
      - key: PaymentProviders__PayPal__WebhookId
        sync: false
      - key: GoogleAuth__ClientId
        sync: false

  - type: static
    name: influencermatch-frontend
    buildCommand: npm --prefix frontend/influencer-match ci && npm --prefix frontend/influencer-match run build
    staticPublishPath: ./frontend/influencer-match/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
